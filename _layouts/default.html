<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: 'Conor Scott — Software Engineer, Bitcoin Disciple, Open Source Advocate. American living in the French Alps.' }}">
    <meta name="theme-color" content="#0b0d0f" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)">
    <title>{{ page.title }}</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme  = stored === 'light' || stored === 'dark' ? stored : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" type="text/css" href="/css/main.css">
    <link rel="shortcut icon" type="image/png" href="/img/favicon.ico">
  </head>

  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a href="/" class="brand" aria-label="Home">
          <span class="brand__caret">~/</span><span class="brand__name">conscott</span>
        </a>
        <nav class="primary" aria-label="Primary">
          <ul>
            <li><a href="/"{% if page.url == "/" %} aria-current="page"{% endif %}>Home</a></li>
            <li><a href="/about"{% if page.url contains "/about" %} aria-current="page"{% endif %}>About</a></li>
            <li><a href="/cv/CV_Conor_Scott.pdf" target="_blank" rel="noopener">CV</a></li>
            <li><a href="/blog"{% if page.url contains "/blog" %} aria-current="page"{% endif %}>Blog</a></li>
            <li>
              <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="4"/>
                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                </svg>
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <span>&copy; {{ 'now' | date: "%Y" }} Conor Scott</span>
        <span>conscott.info</span>
      </div>
    </footer>

    <script>
      (function () {
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
          var next    = current === 'light' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('theme', next); } catch (e) {}
        });
      })();
    </script>
  </body>
</html>
